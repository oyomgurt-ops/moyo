  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Gowun+Batang:wght@400;700&family=Jua&family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .gal-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
    .gal-item{aspect-ratio:1/1; border-radius:var(--radius-md,16px); overflow:hidden; background:var(--main-light); cursor:pointer; box-shadow:var(--shadow); border:none; padding:0;}
    .gal-item img{width:100%; height:100%; object-fit:cover; display:block; transition:transform .25s ease;}
    .gal-item:hover img{transform:scale(1.05);}
    .gal-empty{color:var(--text-soft); font-size:14px; text-align:center; padding:30px 0;}
    .lb{position:fixed; inset:0; background:rgba(25,32,15,.72); display:none; align-items:center; justify-content:center; z-index:700; padding:20px; cursor:zoom-out;}
    .lb.show{display:flex;}
    .lb img{max-width:92vw; max-height:86vh; border-radius:14px; box-shadow:0 24px 70px rgba(0,0,0,.5);}
    .lb .cap{position:fixed; left:50%; bottom:26px; transform:translateX(-50%); color:#f3f1e0; font-size:14px; font-weight:600; text-shadow:0 2px 8px rgba(0,0,0,.6); max-width:86vw; text-align:center;}
    @media (max-width:900px){ .gal-grid{grid-template-columns:repeat(3,1fr);} }
    @media (max-width:600px){ .gal-grid{grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>
<script>if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');</script>

  <div class="ohd"><i></i><span class="dm">✦</span>GALLERY<span class="dm">✦</span><i></i></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>
async function loadGallery(){
  try{
    if (typeof fetchAll !== 'function') throw 0;
    const list = await fetchAll('gallery_items', { order:'id', asc:false });
    const grid = document.getElementById('gal-grid');
    if (grid && list && list.length){
      grid.innerHTML = list.map((g,i) =>
        '<button class="gal-item" type="button" onclick="openLb('+i+')"><img src="'+g.image_url+'" alt="" referrerpolicy="no-referrer" loading="lazy"></button>'
      ).join('');
      window.__gal = list;
    }
  }catch(e){}
  finally{ document.body.classList.add('ready'); }
}
function openLb(i){
  const g=(window.__gal||[])[i]; if(!g) return;
  document.getElementById('lb-img').src=g.image_url;
  document.getElementById('lb-img').setAttribute('referrerpolicy','no-referrer');
  document.getElementById('lb-cap').textContent=g.caption||'';
  document.getElementById('lb').classList.add('show');
}
loadGallery();
setTimeout(()=>document.body.classList.add('ready'),1200);
</script>
<script>
(function(){
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  var sw=document.getElementById('themeSwitch'), knob=document.getElementById('themeKnob');
  function refresh(){ if(knob) knob.textContent=document.body.classList.contains('dark')?'☀️':'🌙'; }
  if(sw) sw.addEventListener('click', function(){
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light');
    refresh();
  });
  refresh();
})();
</script>
<script src="../fx.js"></script>
<script src="../fxplus.js"></script>
<script src="../cursor.js"></script>
